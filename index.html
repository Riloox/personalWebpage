<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="theme-color" content="#000000" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      // Set the document language before paint so screen readers and
      // translators see the stored preference, not the hardcoded default.
      try {
        var l = localStorage.getItem('riloox-lang');
        if (l === 'en' || l === 'es') document.documentElement.lang = l;
      } catch (e) {}
    </script>
    <link rel="canonical" href="https://riloox.site/" />

    <title>Federico Prunell — Backend Software Developer | Java · Python · Cloud</title>
    <meta
      name="description"
      content="Backend engineer at Bantotal building Java services for core banking. Creator of Falta Uno — a live React + TypeScript + Express platform with a real ELO rating engine. Open to backend / full-stack roles, remote-friendly."
    />

    <!-- Preconnect to font CDN to shave the render-blocking request -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
